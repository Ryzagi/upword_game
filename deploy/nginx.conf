# Production reverse proxy for Word Describer.
#
# Assumes:
#   - Built frontend static assets in /var/www/word-describer
#   - FastAPI backend (uvicorn) bound to 127.0.0.1:8000
#   - TLS terminated by an outer proxy (Caddy / ALB / CloudFront) OR by this
#     server with a `listen 443 ssl http2` block added.
#
# For TLS via this server, add:
#   listen 443 ssl http2;
#   ssl_certificate     /etc/ssl/certs/your.fullchain.pem;
#   ssl_certificate_key /etc/ssl/private/your.key.pem;

# WebSocket upgrade map — included once at http {} level.
# If you keep the rest of this file as a `server {}` snippet under a global
# /etc/nginx/nginx.conf, copy this map there:
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Sensible defaults
    client_max_body_size 1m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Static frontend (SPA fallback)
    root /var/www/word-describer;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # JSON API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        access_log off;
    }

    # WebSocket — note the Upgrade/Connection headers and long timeouts.
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
